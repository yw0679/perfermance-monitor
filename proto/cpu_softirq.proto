// 文件归类：内核模块相关文件（可选能力，当前简化版未使用）
// 说明：服务于字符设备/内核模块方案，不属于当前默认主线。

syntax = "proto3";
package monitor.proto;

message SoftIrq {
    string cpu = 1;
    float hi = 2;
    float timer = 3;
    float net_tx = 4;
    float net_rx = 5;
    float block = 6;
    float irq_poll = 7;
    float tasklet = 8;
    float sched = 9;
    float hrtimer = 10;
    float rcu = 11;
  }
