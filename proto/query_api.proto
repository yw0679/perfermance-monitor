// 文件归类：当前版本使用文件（简化版主线）
// 说明：manager 对外提供的查询 API，保留适合 MCP/运维查询的最小接口集。

syntax = "proto3";
package monitor.proto;

import "google/protobuf/timestamp.proto";

message TimeRange {
    google.protobuf.Timestamp start_time = 1;
    google.protobuf.Timestamp end_time = 2;
}

message Pagination {
    int32 page = 1;
    int32 page_size = 2;
}

enum ServerStatus {
    ONLINE = 0;
    OFFLINE = 1;
}

message QueryClusterOverviewRequest {
}

message QueryBestHostRequest {
}

message QueryPerformanceRequest {
    string server_name = 1;
    TimeRange time_range = 2;
    Pagination pagination = 3;
}

message QueryDetailRequest {
    string server_name = 1;
    TimeRange time_range = 2;
    Pagination pagination = 3;
}

message PerformanceRecord {
    string server_name = 1;
    google.protobuf.Timestamp timestamp = 2;

    // CPU 指标
    float cpu_percent = 10;
    float usr_percent = 11;
    float system_percent = 12;
    float nice_percent = 13;
    float idle_percent = 14;
    float io_wait_percent = 15;
    float irq_percent = 16;
    float soft_irq_percent = 17;

    // 负载指标
    float load_avg_1 = 20;
    float load_avg_3 = 21;
    float load_avg_15 = 22;

    // 内存指标
    float mem_used_percent = 30;
    float mem_total = 31;
    float mem_free = 32;
    float mem_avail = 33;

    // 磁盘指标
    float disk_util_percent = 40;

    // 网络指标
    float send_rate = 50;
    float rcv_rate = 51;
    float send_packets_rate = 52;
    float rcv_packets_rate = 53;

    // 评分与变化率
    float score = 60;
    float cpu_percent_rate = 70;
    float load_avg_1_rate = 74;
    float mem_used_percent_rate = 77;
    float disk_util_percent_rate = 78;
    float send_rate_rate = 79;
    float rcv_rate_rate = 80;
}

message ServerOverview {
    string server_name = 1;
    float score = 2;
    google.protobuf.Timestamp last_update = 3;
    ServerStatus status = 4;

    float cpu_percent = 10;
    float mem_used_percent = 11;
    float disk_util_percent = 12;
    float load_avg_1 = 13;
    float send_rate = 14;
    float rcv_rate = 15;
}

message ClusterStats {
    int32 total_servers = 1;
    int32 online_servers = 2;
    int32 offline_servers = 3;
    float avg_score = 4;
    float max_score = 5;
    float min_score = 6;
    string best_server = 7;
    string worst_server = 8;
}

message NetDetailRecord {
    string server_name = 1;
    string net_name = 2;
    google.protobuf.Timestamp timestamp = 3;
    float rcv_bytes_rate = 20;
    float snd_bytes_rate = 21;
    float rcv_packets_rate = 22;
    float snd_packets_rate = 23;
}

message DiskDetailRecord {
    string server_name = 1;
    string disk_name = 2;
    google.protobuf.Timestamp timestamp = 3;
    float read_bytes_per_sec = 10;
    float write_bytes_per_sec = 11;
    float read_iops = 12;
    float write_iops = 13;
    float avg_read_latency_ms = 14;
    float avg_write_latency_ms = 15;
    float util_percent = 16;
}

message QueryClusterOverviewResponse {
    repeated ServerOverview servers = 1;
    ClusterStats cluster_stats = 2;
}

message QueryBestHostResponse {
    ServerOverview best_server = 1;
    ClusterStats cluster_stats = 2;
}

message QueryPerformanceResponse {
    repeated PerformanceRecord records = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message QueryNetDetailResponse {
    repeated NetDetailRecord records = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 page_size = 4;
}

message QueryDiskDetailResponse {
    repeated DiskDetailRecord records = 1;
    int32 total_count = 2;
    int32 page = 3;
    int32 page_size = 4;
}

service QueryService {
    // 返回当前集群中最适合作为调度目标的主机。
    // 优先选择最近 60 秒内仍在线、且最新评分最高的主机。
    rpc QueryBestHost(QueryBestHostRequest)
        returns (QueryBestHostResponse);
    // 返回每台主机最新一次监控快照，用于总览/列表页/MCP 汇总查询。
    rpc QueryClusterOverview(QueryClusterOverviewRequest)
        returns (QueryClusterOverviewResponse);
    // 查询单台主机在一段时间内的综合性能历史。
    rpc QueryPerformance(QueryPerformanceRequest)
        returns (QueryPerformanceResponse);
    // 查询单台主机的网络明细历史。
    rpc QueryNetDetail(QueryDetailRequest)
        returns (QueryNetDetailResponse);
    // 查询单台主机的磁盘明细历史。
    rpc QueryDiskDetail(QueryDetailRequest)
        returns (QueryDiskDetailResponse);
}
// 文件归类：当前版本使用文件（简化版主线）
// 说明：当前默认查询服务与协议生成流程会直接使用该文件。
